name: Deploy TOSUDO Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: 14.225.205.57
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: /var/www/deploy.sh
